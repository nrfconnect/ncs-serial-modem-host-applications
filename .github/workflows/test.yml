# On-target hardware tests on self-hosted runners.
#
# Triggers:
# - push to main: runs every enabled test in .github/test/tests.yml
# - workflow_dispatch: pick branch (GitHub branch dropdown) and test (all or one id)
#
# When adding tests, update workflow_dispatch options below and .github/test/tests.yml.
#
# Prerequisites:
# - Self-hosted Linux runner with USB access to the DK (container runs --privileged -v /dev:/dev)
# - SEGGER J-Link is installed in the job container (see "Install SEGGER J-Link" step)
# - nRF54L15 DK + nRF9151 Serial Modem wired and configured per applications/91m1/doc
# - Self-signed CA certificate and private key stored in GitHub secrets
# - nRF Cloud API key with permission to onboard/delete devices
#
# GitHub variables:
#   CI_NRF54L15_SEGGER_SN=<SEGGER serial of the nRF54L15 DK J-Link>
#   CI_NRF54L15_DEVICE_ID=<16-hex host device ID allowlist; only this ID may be deleted>
#   CI_NRF54L15_SERIAL_PORT=<optional explicit /dev/tty... path; auto-resolved if unset>
#
# GitHub secrets:
#   NRF_CLOUD_API_KEY, NRF_CLOUD_CA_CERT, NRF_CLOUD_CA_KEY

name: Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test:
        description: Which test to run
        required: true
        type: choice
        default: all
        options:
          - all
          - 91m1-cloud-connect-nrf54l15
          - 91m1-application-fota-nrf54l15

permissions:
  contents: read

concurrency:
  group: hardware-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: self-hosted
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.2
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: serial-modem-host-applications

      - name: Resolve test matrix
        id: resolve
        working-directory: serial-modem-host-applications
        env:
          TEST_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.test || 'all' }}
        run: |
          pip install --quiet -r tests/on_target/requirements.txt
          PYTHONPATH=tests/on_target python3 -m ci.catalog matrix --filter "$TEST_FILTER"

  hardware_test:
    needs: plan
    if: ${{ needs.plan.outputs.matrix != '[]' && needs.plan.outputs.matrix != '' }}
    name: ${{ matrix.id }}
    runs-on: self-hosted
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.2
      options: --privileged -v /dev:/dev
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    env:
      CMAKE_PREFIX_PATH: /opt/toolchains
      NRFUTIL_HOME: /usr/local/share/nrfutil
      NRF_CLOUD_API_KEY: ${{ secrets.NRF_CLOUD_API_KEY }}
      NRF_CLOUD_CA_CERT: ${{ secrets.NRF_CLOUD_CA_CERT }}
      NRF_CLOUD_CA_KEY: ${{ secrets.NRF_CLOUD_CA_KEY }}
      CI_NRF54L15_SEGGER_SN: ${{ vars.CI_NRF54L15_SEGGER_SN }}
      CI_NRF54L15_SERIAL_PORT: ${{ vars.CI_NRF54L15_SERIAL_PORT }}
      CI_NRF54L15_DEVICE_ID: ${{ vars.CI_NRF54L15_DEVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: serial-modem-host-applications

      - name: Load test configuration
        id: config
        working-directory: serial-modem-host-applications
        run: |
          set -eu
          pip install --quiet -r tests/on_target/requirements.txt
          TEST_JSON="$(PYTHONPATH=tests/on_target python3 -m ci.catalog load "${{ matrix.id }}")"
          {
            echo "test_json<<EOF"
            echo "$TEST_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Initialize West workspace
        uses: ./serial-modem-host-applications/.github/actions/west-init

      - name: Install SEGGER J-Link
        run: |
          set -eu
          apt-get update && apt-get install --no-install-recommends -y wget
          # nrfutil device 2.19.0 expects J-Link 9.24a at /opt/SEGGER/JLink.
          jlink_deb=JLink_Linux_V924a_x86_64.deb
          wget --post-data="accept_license_agreement=accepted&non_emb_ctr=confirmed" \
            -O "$jlink_deb" "https://www.segger.com/downloads/jlink/$jlink_deb"
          # The postinst script calls udevadm, which is unavailable in CI containers.
          dpkg --unpack "./$jlink_deb"
          rm -f /var/lib/dpkg/info/jlink.postinst
          apt-get install -f -y
          rm -f "$jlink_deb"
          test -f /opt/SEGGER/JLink/libjlinkarm.so

      - name: Install nrfutil
        run: |
          set -eu
          apt-get update && apt-get install --no-install-recommends -y curl
          work_dir="$(mktemp -d)"
          curl -fsSL \
            https://files.nordicsemi.com/artifactory/swtools/external/nrfutil/executables/x86_64-unknown-linux-gnu/nrfutil \
            -o "$work_dir/nrfutil"
          chmod +x "$work_dir/nrfutil"
          install -m 0755 "$work_dir/nrfutil" /usr/local/bin/nrfutil
          curl -fsSL \
            https://files.nordicsemi.com/artifactory/swtools/external/nrfutil/packages/nrfutil/nrfutil-x86_64-unknown-linux-gnu-8.1.1.tar.gz \
            -o "$work_dir/nrfutil-core.tar.gz"
          export NRFUTIL_BOOTSTRAP_TARBALL_PATH="$work_dir/nrfutil-core.tar.gz"
          export NRFUTIL_HOME=/usr/local/share/nrfutil
          mkdir -p "$NRFUTIL_HOME"
          nrfutil install device=2.19.0 --force

      - name: Run hardware test
        working-directory: serial-modem-host-applications
        env:
          REPO_ROOT: ${{ github.workspace }}/serial-modem-host-applications
          TEST_JSON: ${{ steps.config.outputs.test_json }}
        run: |
          PYTHONPATH=tests/on_target python3 -m pytest \
            ${{ matrix.pytest_dir }} \
            -c tests/on_target/tests/pytest.ini \
            --html=build/hardware-pytest-report.html \
            --self-contained-html \
            -v

      - name: Upload serial log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardware-serial-log-${{ matrix.id }}-${{ github.run_id }}
          path: serial-modem-host-applications/build/hardware-serial.log
          if-no-files-found: ignore

      - name: Upload pytest report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hardware-pytest-report-${{ matrix.id }}-${{ github.run_id }}
          path: serial-modem-host-applications/build/hardware-pytest-report.html
          if-no-files-found: ignore
