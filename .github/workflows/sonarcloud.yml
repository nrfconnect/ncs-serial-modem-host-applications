name: Sonarcloud

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*.c'
      - '**/*.h'
      - west.yml
      - '**/CMakeLists.txt'
      - '**/Kconfig*'
      - '**/prj.conf'

permissions:
  contents: read

concurrency:
  group: sonarcloud-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Build and analyze
    runs-on: self-hosted
    container: ghcr.io/zephyrproject-rtos/ci:v0.29.2
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory
      CMAKE_PREFIX_PATH: /opt/toolchains
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: serial-modem-host-applications

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0
          path: serial-modem-host-applications

      - name: Initialize
        working-directory: serial-modem-host-applications
        run: |
          if [ ! -d "../.west" ]; then
            west init -l .
          else
            echo ".west folder already exists, skipping west init."
          fi
          west update -o=--depth=1 -n

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7.1.0

      - name: Build with build wrapper
        working-directory: serial-modem-host-applications/applications/91m1
        run: |
          build-wrapper-linux-x86-64 --out-dir ../../${{ env.BUILD_WRAPPER_OUT_DIR }} \
            west build -b nrf54l15dk/nrf54l15/cpuapp/ns -p

      - name: SonarQube Scan on main
        if: github.event_name != 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            --define sonar.cfamily.compile-commands=serial-modem-host-applications/${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            --define sonar.projectKey=nrfconnect-ncs-serial-modem-host-applications
            --define sonar.organization=nrfconnect
            --define sonar.host.url=https://sonarcloud.io
            --define sonar.inclusions=applications/**/src/**/*.c,applications/**/src/**/*.h,lib/include/**/*.h
          projectBaseDir: serial-modem-host-applications

      - name: SonarQube Scan on PR
        if: github.event_name == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          args: |
            --define sonar.cfamily.compile-commands=serial-modem-host-applications/${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            --define sonar.projectKey=nrfconnect-ncs-serial-modem-host-applications
            --define sonar.organization=nrfconnect
            --define sonar.host.url=https://sonarcloud.io
            --define sonar.inclusions=applications/**/src/**/*.c,applications/**/src/**/*.h,lib/include/**/*.h
            --define sonar.scm.revision=${{ env.HEAD_SHA }}
            --define sonar.pullrequest.key=${{ env.PR_NUMBER }}
            --define sonar.pullrequest.branch=${{ env.PR_BRANCH }}
            --define sonar.pullrequest.base=${{ env.BASE_REF }}
          projectBaseDir: serial-modem-host-applications
