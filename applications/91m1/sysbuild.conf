# Partition Manager sizes TFM SRAM (default 0x13000 on nRF54L15) so the NS app
# gets ~180 kB RAM instead of the static 128 kB split in the devicetree.
SB_CONFIG_PARTITION_MANAGER=y
SB_CONFIG_BOOTLOADER_MCUBOOT=n
