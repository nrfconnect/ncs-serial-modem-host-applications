# --- General -------------------------------------------------------------------

CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Serial Modem Host 91m1"
CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_REBOOT=y
CONFIG_USE_DT_CODE_PARTITION=y

# MCUboot (primary on RRAM, secondary on external mx25r64)
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_STREAM_FLASH=y
CONFIG_STREAM_FLASH_ERASE=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_FPU=y
CONFIG_PICOLIBC_IO_FLOAT=y

# --- Logging -------------------------------------------------------------------

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096

# --- RTOS / application framework ----------------------------------------------

CONFIG_ZBUS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_SMF_INITIAL_TRANSITION=y
CONFIG_TASK_WDT=y

CONFIG_TEST_RANDOM_GENERATOR=y

# --- Heap and stacks -----------------------------------------------------------

CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

# --- Application modules -------------------------------------------------------

CONFIG_APP_NETWORK=y
CONFIG_APP_NETWORK_LOG_LEVEL_DBG=y

CONFIG_APP_CLOUD=y
CONFIG_APP_CLOUD_LOG_LEVEL_DBG=y

CONFIG_APP_FOTA=y
CONFIG_APP_FOTA_SHELL=y
CONFIG_APP_FOTA_LOG_LEVEL_INF=y

# --- Networking (PPP + conn_mgr) -----------------------------------------------

CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_MAX_CONN=12
CONFIG_NET_MAX_CONTEXTS=12
CONFIG_ZVFS_POLL_MAX=20
CONFIG_ZVFS_OPEN_MAX=20

CONFIG_NET_PKT_RX_COUNT=24
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=48
CONFIG_NET_BUF_DATA_SIZE=256

CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=10000
CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=8
CONFIG_DNS_NUM_CONCUR_QUERIES=4
CONFIG_DNS_RESOLVER_MAX_SERVERS=4
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_DNS_SERVER2="1.1.1.1"
CONFIG_NET_L2_PPP_OPTION_DNS_USE=y

CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=512
CONFIG_NET_MGMT_EVENT_STACK_SIZE=800

# --- Cellular modem (nordic,nrf91-sm-v2 on uart30) -----------------------------

CONFIG_MODEM=y
CONFIG_MODEM_CELLULAR=y
CONFIG_MODEM_DEDICATED_WORKQUEUE=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_DEVICE_RUNTIME_USE_DEDICATED_WQ=y
CONFIG_MODEM_CMUX_MTU=127
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE_EXTRA=532
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=532

# --- Shell and TLS credentials -------------------------------------------------

CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_NET_SHELL=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_SHELL=y
CONFIG_TLS_CREDENTIALS_SHELL_CRED_BUF_SIZE=3072
CONFIG_TLS_CREDENTIALS_BACKEND_PROTECTED_STORAGE=y
# nRF Cloud credentials (CA, client cert, private key) in protected storage.
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=4
CONFIG_TFM_PARTITION_PROTECTED_STORAGE=y
CONFIG_BASE64=y
CONFIG_SETTINGS=y

# --- nRF Cloud CoAP (host-native over PPP) -------------------------------------

CONFIG_NRF_CLOUD=y
CONFIG_NRF_CLOUD_COAP=y
CONFIG_NRF_CLOUD_COAP_DOWNLOADS=y
CONFIG_NRF_CLOUD_CHECK_CREDENTIALS=y
CONFIG_NRF_CLOUD_CREDENTIALS_MGMT_TLS_CRED=y
CONFIG_NRF_CLOUD_JWT_SOURCE_CUSTOM=y

CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_DEVICE_ID=y
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_HW_ID=y

CONFIG_COAP_CLIENT_BLOCK_SIZE=1024
CONFIG_COAP_CLIENT_STACK_SIZE=4096
CONFIG_COAP_CLIENT_THREAD_PRIORITY=0
CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=192
CONFIG_NRF_CLOUD_COAP_MAX_USER_OPTIONS=2
CONFIG_COAP_CLIENT_MAX_EXTRA_OPTIONS=3

CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_NTP=y
CONFIG_DATE_TIME_RETRY_COUNT=3

# --- Memfault ------------------------------------------------------------------

# Memfault depends on POSIX, disable unneeded POSIX features
CONFIG_POSIX_FILE_SYSTEM=n

# Memfault
CONFIG_MEMFAULT=y
CONFIG_MEMFAULT_NCS_FW_TYPE="smha-91m1"
CONFIG_MEMFAULT_NCS_FW_VERSION="0.1.0"
CONFIG_MEMFAULT_NCS_FW_VERSION_STATIC=y
CONFIG_MEMFAULT_SHELL=y
CONFIG_MEMFAULT_PERIODIC_UPLOAD=y
CONFIG_MEMFAULT_PERIODIC_UPLOAD_USE_SYSTEM_WORKQUEUE=y
CONFIG_MEMFAULT_LOGGING_ENABLE=y
CONFIG_MEMFAULT_LOGGING_RAM_SIZE=1536
CONFIG_MEMFAULT_LOG_LEVEL_DBG=y
CONFIG_MEMFAULT_NCS_STACK_METRICS=y
CONFIG_MEMFAULT_HEAP_STATS=y

# Upload Memfault data via nRF Cloud CoAP (reuses the cloud DTLS session + host JWT).
CONFIG_MEMFAULT_USE_NRF_CLOUD_COAP=y
CONFIG_MEMFAULT_HTTP_ENABLE=n

CONFIG_MEMFAULT_NCS_LOG_LEVEL_DBG=y
CONFIG_MEMFAULT_COREDUMP_COLLECT_BSS_REGIONS=y

# RAM-backed coredump (flash-backed needs CONFIG_FLASH=y and a storage partition).
CONFIG_MEMFAULT_RAM_BACKED_COREDUMP_SIZE=3072
CONFIG_PSA_WANT_ALG_SHA_1=y

# FOTA (Memfault OTA via nRF Cloud CoAP download proxy)
CONFIG_MEMFAULT_ZEPHYR_FOTA_BACKEND_NRF_CLOUD_OVERRIDE=y
CONFIG_NRF_CLOUD_FOTA=n
CONFIG_NRF_CLOUD_FOTA_POLL=y
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_TRANSPORT_COAP=y
CONFIG_DOWNLOADER_TRANSPORT_HTTP=n
CONFIG_DOWNLOADER_STACK_SIZE=4096
CONFIG_DOWNLOADER_MAX_FILENAME_SIZE=512
CONFIG_FOTA_DOWNLOAD=y
CONFIG_FOTA_DOWNLOAD_PROGRESS_EVT=y
CONFIG_FOTA_SOCKET_RETRIES=5
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y
CONFIG_FOTA_DOWNLOAD_LOG_LEVEL_INF=y

# --- Crypto (host JWT signing + CoAP DTLS over native sockets) -----------------

CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_ENABLE_DTLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=1
CONFIG_NET_SOCKETS_TLS_MAX_CREDENTIALS=4
CONFIG_MBEDTLS_SSL_DTLS_CONNECTION_ID=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=2048
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=2048
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_DECLARE_PRIVATE_IDENTIFIERS=y
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=18200
