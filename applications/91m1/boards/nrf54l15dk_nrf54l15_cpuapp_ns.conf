CONFIG_UART_ASYNC_API=y
CONFIG_MODEM_BACKEND_UART_ASYNC_HWFC=y

# Shell/console on uart20 uses interrupt-driven UART; modem on uart30 is async-only.
CONFIG_UART_30_INTERRUPT_DRIVEN=n
CONFIG_UART_30_ASYNC=y

# Silence TF-M logs to avoid conflicts with modem UART.
CONFIG_TFM_LOG_LEVEL_SILENCE=y

CONFIG_MODEM_CMUX_MSC_FC_THRESHOLD=32

# SFN + MM-IOVEC reduce secure-side RAM; ITS encryption
# is disabled because credentials live in Protected Storage, not ITS.
CONFIG_TFM_SFN=y
CONFIG_TFM_IPC=n
CONFIG_TFM_PSA_FRAMEWORK_HAS_MM_IOVEC=y
CONFIG_TFM_ITS_ENCRYPTED=n

# Match boards/nrf54l15_cpuapp_ns_partitions.dtsi (TF-M uses ~88 kB FLASH, ~33 kB RAM).
CONFIG_PM_PARTITION_SIZE_TFM=0x20000
CONFIG_PM_PARTITION_SIZE_TFM_SRAM=0xC000
