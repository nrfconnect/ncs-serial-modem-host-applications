# Application identity
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="Serial Modem Host 93m1 (AT)"

# Application modules
CONFIG_APP_NETWORK=y
CONFIG_APP_MODEM_AT=y
CONFIG_APP_CLOUD=y
CONFIG_APP_LOCATION=y
CONFIG_APP_BATTERY=y
CONFIG_APP_NETWORK_LOG_LEVEL_INF=y
CONFIG_APP_MODEM_AT_LOG_LEVEL_INF=y
CONFIG_APP_CLOUD_LOG_LEVEL_INF=y
CONFIG_APP_LOCATION_LOG_LEVEL_INF=y
CONFIG_APP_BATTERY_LOG_LEVEL_INF=y

# System / RTOS
CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_ZBUS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_SMF_INITIAL_TRANSITION=y
CONFIG_TASK_WDT=y
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_MODEM_MODULES_LOG_LEVEL_INF=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_WILDCARD=n
CONFIG_SHELL_BACKEND_SERIAL_ASYNC_RX_BUFFER_SIZE=64

# Networking: PPP link only for automatic connectivity management
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
# UDP is kept on so the native IP core compiles
CONFIG_NET_UDP=y
CONFIG_NET_TCP=n
CONFIG_NET_SOCKETS=n
CONFIG_NET_MAX_CONN=4
CONFIG_NET_MAX_CONTEXTS=4
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=512
CONFIG_NET_MGMT_EVENT_STACK_SIZE=800
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_LOG=y
CONFIG_NET_SHELL=y

# Cellular modem driver
CONFIG_MODEM=y
CONFIG_MODEM_CELLULAR=y
CONFIG_MODEM_DEDICATED_WORKQUEUE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_PM_DEVICE_RUNTIME_USE_DEDICATED_WQ=y
CONFIG_MODEM_CMUX_MTU=127
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE_EXTRA=532
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=532
# Disable the in-tree modem AT shell.
CONFIG_MODEM_AT_SHELL=n
CONFIG_MODEM_AT_USER_PIPE_IDX=0
CONFIG_MODEM_CELLULAR_USER_PIPE_BUFFER_SIZES=1024
CONFIG_MODEM_CMUX_LOG_LEVEL_INF=y

# Board peripherals
CONFIG_GPIO=y
CONFIG_I2C=y

# Battery: nPM1300 fuel gauge + charger
CONFIG_SENSOR=y
CONFIG_MFD=y
CONFIG_NPM13XX_CHARGER=y
CONFIG_NRF_FUEL_GAUGE=y
CONFIG_NRF_FUEL_GAUGE_VARIANT_SECONDARY_CELL=y

# Power management
CONFIG_PM_DEVICE=y
